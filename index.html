<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>like 6… 7</title>
  <meta name="description" content="The six seven page. You know why you're here." />
  <meta property="og:title" content="like 6… 7" />
  <meta property="og:description" content="The six seven page. You know why you're here." />
  <meta property="og:url" content="https://like67.com" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="like 6… 7" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="like67" />
  <link rel="apple-touch-icon" href="/assets/icon-192.png" />
  <style>
    :root {
      --hot: #ff2bd6;
      --lime: #9cff00;
      --cyan: #00f7ff;
      --yellow: #fff200;
      --orange: #ff7a00;
      --purple: #7b2cff;
      --dark: #050013;
    }
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    html { background: #000; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background: radial-gradient(circle at center, #25105f 0%, #09001e 45%, #000 100%);
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      color: white;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: grid;
      place-items: center;
      isolation: isolate;
      animation: stagePulse 1.15s infinite steps(2, end);
    }
    .stage::before {
      content: "";
      position: absolute;
      inset: -25%;
      background:
        conic-gradient(from 0deg, var(--hot), var(--yellow), var(--cyan), var(--lime), var(--purple), var(--hot));
      filter: blur(18px) saturate(2.5);
      opacity: 0.55;
      animation: spin 4s linear infinite, bgThrob .67s ease-in-out infinite alternate;
      z-index: -3;
    }
    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.12) 0 2px, transparent 2px 11px),
        repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 17px);
      mix-blend-mode: overlay;
      opacity: .55;
      pointer-events: none;
      animation: scan 1.4s linear infinite;
      z-index: 20;
    }
    .burst {
      position: absolute;
      inset: -10%;
      background: repeating-conic-gradient(from 0deg, rgba(255,255,255,.32) 0 7deg, transparent 7deg 14deg);
      clip-path: circle(45% at 50% 50%);
      animation: burstSpin 2.3s linear infinite, burstPop .67s ease-in-out infinite alternate;
      opacity: .42;
      z-index: -1;
    }
    .main {
      position: absolute;
      left: 50%;
      top: 50%;
      translate: -50% -50%;
      display: flex;
      align-items: center;
      gap: clamp(12px, 4vw, 52px);
      transform-style: preserve-3d;
      animation: chaoticTilt .67s infinite alternate cubic-bezier(.2, 1.6, .4, .8);
      z-index: 5;
    }
    .num {
      position: relative;
      font-size: clamp(130px, 26vw, 420px);
      line-height: .8;
      letter-spacing: -.08em;
      color: white;
      text-shadow:
        8px 8px 0 var(--hot),
        -8px -8px 0 var(--cyan),
        0 0 25px white,
        0 0 70px var(--yellow),
        0 0 120px var(--hot);
      animation: numberBounce .67s infinite cubic-bezier(.18, .89, .32, 1.28), glitch .23s infinite steps(2, end);
    }
    .num.six { animation-delay: -.08s; }
    .num.seven { animation-delay: -.28s; }
    .num::before,
    .num::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: .85;
      mix-blend-mode: screen;
      pointer-events: none;
    }
    .num::before {
      color: var(--cyan);
      transform: translate(-10px, 6px);
      clip-path: inset(0 0 48% 0);
      animation: sliceA .19s infinite alternate;
    }
    .num::after {
      color: var(--hot);
      transform: translate(10px, -5px);
      clip-path: inset(53% 0 0 0);
      animation: sliceB .21s infinite alternate;
    }
    .dash {
      font-size: clamp(64px, 10vw, 160px);
      color: var(--yellow);
      text-shadow: 0 0 30px var(--yellow), 5px 5px 0 var(--purple);
      animation: dashFlip .67s infinite linear;
      padding: .15em;
      cursor: default;
    }
    .chant {
      position: absolute;
      bottom: 9vh;
      left: 50%;
      transform: translateX(-50%);
      width: max-content;
      max-width: 94vw;
      font-size: clamp(22px, 5.5vw, 74px);
      letter-spacing: .08em;
      color: var(--yellow);
      text-shadow: 4px 4px 0 #000, 0 0 30px var(--orange);
      animation: chantShake .19s infinite, colorSwap .67s infinite steps(3, end);
      z-index: 10;
    }
    .chant-mobile-top,
    .chant-mobile-bottom { display: none; }

    @media (max-width: 600px) {
      .chant-desktop { display: none; }
      .chant-mobile-top {
        display: block;
        top: 12vh;
        bottom: auto;
        font-size: clamp(22px, 8vw, 52px);
      }
      .chant-mobile-bottom {
        display: block;
        font-size: clamp(22px, 8vw, 52px);
      }
    }
    .rare-win {
      position: absolute;
      top: 7vh;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg) scale(0);
      padding: .25em .7em;
      border: 6px solid white;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--yellow), var(--hot), var(--cyan));
      color: #000;
      font-size: clamp(24px, 5vw, 84px);
      text-shadow: 2px 2px 0 white;
      box-shadow: 0 0 45px white, 0 0 90px var(--yellow);
      opacity: 0;
      z-index: 30;
      pointer-events: none;
    }
    .rare-win.show {
      opacity: 1;
      animation: rareWin 1.4s infinite cubic-bezier(.2, 1.7, .3, .9);
    }
    .hype {
      position: absolute;
      top: 7vh;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg) scale(0);
      padding: .25em .6em;
      border: 5px solid white;
      border-radius: 999px;
      background: #000;
      color: var(--lime);
      font-size: clamp(18px, 3vw, 44px);
      text-shadow: 0 0 18px var(--lime);
      box-shadow: 0 0 35px var(--cyan), inset 0 0 18px var(--hot);
      opacity: 0;
      z-index: 15;
      pointer-events: none;
    }
    .hype.show {
      opacity: 1;
      animation: hypeRare 1.4s ease-out forwards;
    }
    .emoji-rain span,
    .mini span {
      position: absolute;
      display: inline-block;
      font-size: clamp(28px, 4vw, 70px);
      filter: drop-shadow(0 0 12px rgba(255,255,255,.85));
      animation: fall linear infinite;
      z-index: 3;
    }
    .mini span {
      font-size: clamp(16px, 2vw, 34px);
      color: var(--yellow);
      animation-name: floaty;
      font-family: Impact, "Arial Black", sans-serif;
    }
    .flash {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      animation: flash .67s infinite steps(1, end);
      z-index: 100;
      mix-blend-mode: overlay;
    }
    .shockwave {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12vmin;
      aspect-ratio: 1;
      border: 8px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      filter: drop-shadow(0 0 25px var(--cyan));
      animation: shock 1.2s ease-out forwards;
    }
    .laser {
      position: absolute;
      width: 180vw;
      height: 8px;
      left: -40vw;
      top: 50%;
      background: linear-gradient(90deg, transparent, white, var(--cyan), var(--hot), white, transparent);
      box-shadow: 0 0 18px white, 0 0 45px var(--hot);
      transform: rotate(0deg);
      animation: laserSweep .9s ease-in-out forwards;
      z-index: 2;
      pointer-events: none;
    }
    .sticker-bomb {
      position: absolute;
      padding: .12em .32em;
      border: 4px solid #000;
      background: var(--yellow);
      color: #000;
      font-size: clamp(18px, 3vw, 50px);
      transform: rotate(var(--rot));
      box-shadow: 7px 7px 0 rgba(0,0,0,.5), 0 0 25px white;
      animation: stickerBomb 1.8s ease-out forwards;
      z-index: 8;
      pointer-events: none;
    }
    .audrey {
      position: absolute;
      top: 7vh;
      left: 50%;
      transform: translateX(-50%) scale(0);
      padding: .25em .8em;
      border: 5px solid white;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--purple), var(--hot), var(--cyan));
      color: white;
      font-size: clamp(18px, 4vw, 60px);
      text-shadow: 2px 2px 0 rgba(0,0,0,.55);
      box-shadow: 0 0 50px var(--hot), 0 0 100px var(--purple), inset 0 0 20px rgba(255,255,255,.2);
      white-space: nowrap;
      opacity: 0;
      z-index: 35;
      pointer-events: none;
    }
    .audrey.show {
      opacity: 1;
      animation: audreyPop 3s ease-out forwards;
    }
    .corner-link {
      position: fixed;
      bottom: 14px;
      right: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.25s;
      z-index: 50;
    }
    .corner-link:hover { color: rgba(255,255,255,0.85); }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bgThrob { to { opacity: .85; transform: scale(1.08); } }
    @keyframes scan { to { transform: translateY(20px); } }
    @keyframes stagePulse { 50% { filter: hue-rotate(90deg) contrast(1.35); } }
    @keyframes burstSpin { to { transform: rotate(-360deg); } }
    @keyframes burstPop { to { clip-path: circle(62% at 50% 50%); opacity: .7; } }
    @keyframes chaoticTilt {
      0% { transform: rotate(-4deg) scale(1) translateY(0); }
      50% { transform: rotate(3deg) scale(1.08) translateY(-10px); }
      100% { transform: rotate(-1deg) scale(.98) translateY(4px); }
    }
    @keyframes numberBounce {
      0%, 100% { transform: translateY(0) rotate(-2deg) scale(1); }
      37% { transform: translateY(-32px) rotate(3deg) scale(1.08); }
      67% { transform: translateY(20px) rotate(-5deg) scale(.96); }
    }
    @keyframes glitch {
      0% { filter: hue-rotate(0deg); transform: translate(0,0); }
      25% { filter: hue-rotate(80deg); transform: translate(4px,-2px); }
      50% { filter: hue-rotate(160deg); transform: translate(-3px,3px); }
      75% { filter: hue-rotate(260deg); transform: translate(2px,1px); }
      100% { filter: hue-rotate(360deg); transform: translate(0,0); }
    }
    @keyframes sliceA { to { transform: translate(-22px, 2px) skewX(12deg); } }
    @keyframes sliceB { to { transform: translate(20px, -1px) skewX(-15deg); } }
    @keyframes dashFlip { to { transform: rotate(360deg) scale(1.25); } }
    @keyframes chantShake {
      0% { transform: translateX(-50%) translate(0,0) rotate(0deg); }
      33% { transform: translateX(-50%) translate(5px,-3px) rotate(1deg); }
      66% { transform: translateX(-50%) translate(-4px,4px) rotate(-1deg); }
      100% { transform: translateX(-50%) translate(2px,1px) rotate(0deg); }
    }
    @keyframes colorSwap {
      0% { color: var(--yellow); }
      33% { color: var(--cyan); }
      66% { color: var(--hot); }
    }
    @keyframes sticker { to { transform: translateX(-50%) rotate(3deg) scale(1.08); } }
    @keyframes rareWin {
      0%, 100% { transform: translateX(-50%) rotate(-5deg) scale(1); }
      40% { transform: translateX(-50%) rotate(6deg) scale(1.35); }
      70% { transform: translateX(-50%) rotate(-2deg) scale(.95); }
    }
    @keyframes hypeRare {
      0% { transform: translateX(-50%) rotate(-8deg) scale(.2); opacity: 0; }
      15% { transform: translateX(-50%) rotate(4deg) scale(1.18); opacity: 1; }
      78% { transform: translateX(-50%) rotate(-2deg) scale(1); opacity: 1; }
      100% { transform: translateX(-50%) rotate(8deg) scale(0); opacity: 0; }
    }
    @keyframes shock {
      0% { transform: translate(-50%, -50%) scale(0); opacity: .9; }
      100% { transform: translate(-50%, -50%) scale(11); opacity: 0; }
    }
    @keyframes laserSweep {
      0% { transform: translateY(-60vh) rotate(-18deg); opacity: 0; }
      25% { opacity: 1; }
      100% { transform: translateY(60vh) rotate(18deg); opacity: 0; }
    }
    @keyframes stickerBomb {
      0% { transform: translate(-50%, -50%) rotate(var(--rot)) scale(.25); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translate(-50%, -50%) rotate(calc(var(--rot) + 50deg)) scale(1.7); opacity: 0; }
    }
    @keyframes fall {
      from { transform: translateY(-45vh) rotate(0deg) scale(.7); opacity: 0; }
      10% { opacity: 1; }
      to { transform: translateY(120vh) rotate(720deg) scale(1.15); opacity: 0; }
    }
    @keyframes floaty {
      from { transform: translateY(130vh) rotate(0deg); opacity: 0; }
      15% { opacity: 1; }
      to { transform: translateY(-25vh) rotate(-540deg); opacity: 0; }
    }
    @keyframes flash {
      0%, 83%, 100% { opacity: 0; }
      67% { opacity: .28; }
    }
    @keyframes audreyPop {
      0%   { transform: translateX(-50%) rotate(-6deg) scale(.15); opacity: 0; }
      10%  { transform: translateX(-50%) rotate(4deg)  scale(1.22); opacity: 1; }
      20%  { transform: translateX(-50%) rotate(-2deg) scale(1); }
      75%  { transform: translateX(-50%) rotate(-2deg) scale(1);   opacity: 1; }
      100% { transform: translateX(-50%) rotate(6deg)  scale(.2);  opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 2s !important; }
    }

    /* ── Hint labels ── */
    .fs-hint,
    .home-hint {
      position: fixed;
      bottom: 14px;
      left: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
      z-index: 50;
      transition: opacity 1.5s ease;
      display: none;
    }
    /* desktop (mouse) only */
    @media (hover: hover) and (pointer: fine) {
      .fs-hint { display: block; }
    }
    /* touch / mobile only */
    @media (hover: none), (pointer: coarse) {
      .home-hint { display: block; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="burst"></div>
    <div class="emoji-rain" id="emojiRain"></div>
    <div class="mini" id="miniRain"></div>
    <div class="rare-win" id="rareWin">I WIN!</div>
    <div class="hype" id="hypeText"></div>
    <div class="audrey" id="audreyEgg">Audrey Burns 🎉</div>
    <main class="main" aria-label="Six Seven meme animation">
      <div class="num six" data-text="6">6</div>
      <div class="dash" id="dashBtn">⚡</div>
      <div class="num seven" data-text="7">7</div>
    </main>
    <div class="chant chant-desktop">SIX&nbsp;&nbsp;SEVEN&nbsp;&nbsp;SIX&nbsp;&nbsp;SEVEN</div>
    <div class="chant chant-mobile-top">SIX&nbsp;&nbsp;SEVEN</div>
    <div class="chant chant-mobile-bottom">SIX&nbsp;&nbsp;SEVEN</div>
    <div class="flash"></div>
  </div>
  <div class="fs-hint" id="fsHint">Double-click for full screen</div>
  <div class="home-hint" id="homeHint"></div>
  <a href="https://github.com/SteveRyherd/like67.com" class="corner-link" target="_blank" rel="noopener noreferrer">How was this made? &rarr;</a>
  <script>
    const emojiRain = document.getElementById('emojiRain');
    const miniRain = document.getElementById('miniRain');
    const rareWin = document.getElementById('rareWin');
    const hypeText = document.getElementById('hypeText');
    const emojis = ['🏀', '💥', '🔥', '🌀', '⚡', '🤯', '🫨', '👟', '✨', '📣', '🧨', '🚨', '💫'];
    const hypeLines = [
      'WHAT IS HAPPENING',
      'SIX SEVEN MODE',
      'TOO MUCH SAUCE',
      'ABSOLUTE CINEMA',
      'LEGALLY UNNECESSARY',
      'BRAIN BUFFERING',
      'MAXIMUM GOOFBALL'
    ];
    const rareWinner = Math.floor(Math.random() * 10000) === 67;
    if (rareWinner) rareWin.classList.add('show');
    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }
    function makeRain() {
      emojiRain.innerHTML = '';
      miniRain.innerHTML = '';
      for (let i = 0; i < 42; i++) {
        const s = document.createElement('span');
        s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        s.style.left = rand(-5, 100) + 'vw';
        s.style.animationDuration = rand(2.2, 6.7) + 's';
        s.style.animationDelay = rand(-2.5, 0) + 's';
        s.style.transform = `scale(${rand(.6, 1.5)})`;
        emojiRain.appendChild(s);
      }
      for (let i = 0; i < 67; i++) {
        const s = document.createElement('span');
        s.textContent = Math.random() > .5 ? '6' : '7';
        s.style.left = rand(-5, 100) + 'vw';
        s.style.animationDuration = rand(2, 8) + 's';
        s.style.animationDelay = rand(-2.5, 0) + 's';
        s.style.opacity = rand(.25, .95);
        miniRain.appendChild(s);
      }
    }
    function boom() {
      makeRain();
      shockwave();
      laser();
      stickerBombs();
      maybeHype();
      document.body.animate([
        { filter: 'hue-rotate(0deg) saturate(1)' },
        { filter: 'hue-rotate(220deg) saturate(3) contrast(1.6)' },
        { filter: 'hue-rotate(0deg) saturate(1)' }
      ], { duration: 670, easing: 'steps(6, end)' });
    }
    function maybeHype() {
      if (Math.random() > 0.12) return;
      hypeText.textContent = hypeLines[Math.floor(Math.random() * hypeLines.length)];
      hypeText.classList.remove('show');
      void hypeText.offsetWidth;
      hypeText.classList.add('show');
      setTimeout(() => hypeText.classList.remove('show'), 1500);
    }
    function shockwave() {
      const wave = document.createElement('div');
      wave.className = 'shockwave';
      document.getElementById('stage').appendChild(wave);
      setTimeout(() => wave.remove(), 1300);
    }
    function laser() {
      const beam = document.createElement('div');
      beam.className = 'laser';
      beam.style.top = rand(20, 80) + 'vh';
      beam.style.transform = `rotate(${rand(-25, 25)}deg)`;
      document.getElementById('stage').appendChild(beam);
      setTimeout(() => beam.remove(), 950);
    }
    function stickerBombs() {
      const words = ['6', '7', 'WHY', 'LOUD', 'BRUH', 'GO', 'NOPE', 'YES'];
      for (let i = 0; i < 8; i++) {
        const tag = document.createElement('div');
        tag.className = 'sticker-bomb';
        tag.textContent = words[Math.floor(Math.random() * words.length)];
        tag.style.left = rand(10, 90) + 'vw';
        tag.style.top = rand(15, 85) + 'vh';
        tag.style.setProperty('--rot', rand(-30, 30) + 'deg');
        document.getElementById('stage').appendChild(tag);
        setTimeout(() => tag.remove(), 1900);
      }
    }
    function toggleFullScreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
    document.addEventListener('dblclick', toggleFullScreen);

    // Easter egg: hold the lightning bolt for 3 seconds
    const audreyEgg = document.getElementById('audreyEgg');
    const dashBtn = document.getElementById('dashBtn');
    let pressTimer = null;
    function triggerAudrey() {
      audreyEgg.classList.remove('show');
      void audreyEgg.offsetWidth;
      audreyEgg.classList.add('show');
      setTimeout(() => audreyEgg.classList.remove('show'), 3000);
    }
    function startPress(e) { e.stopPropagation(); pressTimer = setTimeout(triggerAudrey, 3000); }
    function cancelPress() { clearTimeout(pressTimer); }
    dashBtn.addEventListener('mousedown', startPress);
    dashBtn.addEventListener('touchstart', startPress, { passive: false });
    document.addEventListener('mouseup', cancelPress);
    document.addEventListener('touchend', cancelPress);
    document.addEventListener('touchmove', cancelPress, { passive: true });
    document.addEventListener('contextmenu', e => e.preventDefault());
    makeRain();
    setInterval(() => {
      if (Math.random() > .55) boom();
    }, 6700);

    // ── Desktop fullscreen hint ──
    const fsHint = document.getElementById('fsHint');
    if (fsHint && document.fullscreenEnabled) {
      const ua = navigator.userAgent || '';
      const isMac = /macintosh|mac os x/i.test(ua) && !/iphone|ipad/i.test(ua);
      if (!isMac) fsHint.textContent = 'Double-click · F11 for full screen';
      const fadeFs = () => { fsHint.style.opacity = '0'; };
      setTimeout(fadeFs, 7000);
      setTimeout(() => { fsHint.style.display = 'none'; }, 8600);
      document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) fsHint.style.display = 'none';
      });
    }

    // ── Mobile "Add to Home Screen" hint ──
    const homeHint = document.getElementById('homeHint');
    if (homeHint) {
      const isStandalone = window.navigator.standalone ||
        window.matchMedia('(display-mode: standalone)').matches;
      if (!isStandalone) {
        const ua2 = navigator.userAgent || '';
        const isIOS = /iphone|ipad|ipod/i.test(ua2);
        const isAndroid = /android/i.test(ua2);
        if (isIOS) {
          homeHint.textContent = 'Tap Share → Add to Home Screen';
        } else if (isAndroid) {
          homeHint.textContent = 'Tap ⋮ → Add to Home Screen';
        } else {
          homeHint.style.display = 'none';
        }
        if (isIOS || isAndroid) {
          setTimeout(() => { homeHint.style.opacity = '0'; }, 7000);
          setTimeout(() => { homeHint.style.display = 'none'; }, 8600);
        }
      } else {
        homeHint.style.display = 'none';
      }
    }
  </script>
</body>
</html>
